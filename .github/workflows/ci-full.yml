name: CI Full

# Trigger full quality gates on protected branches for both direct pushes and PRs.
on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  # Detect impacted services with a maintained GitHub Action (no custom script).
  detect-services:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      services_json: ${{ steps.detect.outputs.services_json }}
      has_services: ${{ steps.detect.outputs.has_services }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: paths
        uses: dorny/paths-filter@v3
        with:
          filters: |
            shared:
              - '.github/workflows/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'Makefile'
              - 'services/__init__.py'
            api:
              - 'services/api/**'

      - name: Build service matrix
        id: detect
        run: |
          if [ "${{ steps.paths.outputs.shared }}" = "true" ] || [ "${{ steps.paths.outputs.api }}" = "true" ]; then
            echo 'services_json=[{"service_name":"api","service_package":"demo-fastapi-api","service_path":"services/api","service_tests_path":"services/api/tests","openapi_module":"services.api.main","openapi_app_var":"app"}]' >> "$GITHUB_OUTPUT"
            echo 'has_services=true' >> "$GITHUB_OUTPUT"
          else
            echo 'services_json=[]' >> "$GITHUB_OUTPUT"
            echo 'has_services=false' >> "$GITHUB_OUTPUT"
          fi

  # Service-level quality gates (tests/lint/type/docs) are delegated to a reusable workflow.
  service-ci:
    if: ${{ needs.detect-services.outputs.has_services == 'true' }}
    needs: [detect-services]
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-services.outputs.services_json) }}
    uses: ./.github/workflows/reusable-service-ci.yml
    with:
      service-package: ${{ matrix.service.service_package }}
      service-path: ${{ matrix.service.service_path }}
      service-tests-path: ${{ matrix.service.service_tests_path }}
      openapi-module: ${{ matrix.service.openapi_module }}
      openapi-app-var: ${{ matrix.service.openapi_app_var }}
      python-version: "3.14"

  # Repo-level quality gates (pre-commit + security) are delegated to a reusable workflow.
  repo-quality:
    uses: ./.github/workflows/reusable-repo-quality.yml
    with:
      python-version: "3.14"

  final-status:
    name: CI Full Status
    needs: [detect-services, service-ci, repo-quality]
    runs-on: ubuntu-latest
    if: always()

    steps:
      # Centralized policy gate: decides what is merge-blocking vs advisory.
      - name: Determine job status
        run: |
          echo "=== CI FULL SUMMARY ==="
          echo "Detected services: ${{ needs.detect-services.outputs.services_json }}"
          echo "Service CI: ${{ needs.service-ci.result }}"
          echo "Repo Quality: ${{ needs.repo-quality.result }}"

          # Fail if critical jobs failed
          if [ "${{ needs.service-ci.result }}" = "failure" ]; then
            echo "❌ Service CI failed - blocking merge"
            exit 1
          fi

          if [ "${{ needs.repo-quality.result }}" = "failure" ]; then
            echo "❌ Repo quality checks failed - blocking merge"
            exit 1
          fi

          echo "✅ CI Full passed - ready for merge"

  # Final job keeps a single pass/fail signal for branch protection.
  notify:
    name: Notify Completion
    needs: [final-status]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: CI Completion Status
        run: |
          if [ "${{ needs.final-status.result }}" = "success" ]; then
            echo "✅ All CI checks passed!"
          else
            echo "❌ CI checks failed"
            exit 1
          fi
