name: Reusable Repo Quality

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version for repo-level quality checks"
        required: false
        type: string
        default: "3.14"

jobs:
  # Mirrors local developer workflow by invoking the Makefile entrypoint.
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c
        with:
          python-version: ${{ inputs.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f

      - name: Install dependencies
        run: |
          uv sync --frozen --all-packages --all-groups

      - name: Run pre-commit hooks
        run: |
          make run-hooks

  link-check:
    name: Link Check (Lychee)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Check links with Lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411
        with:
          args: >-
            --no-progress
            --exclude-private
            --exclude-path services/api/logs/**
            --root-dir .
            './**/*.md'
            './**/*.rst'
            './**/*.html'
          fail: true
          format: markdown

  security-audit:
    name: Security & Dependency Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c
        with:
          python-version: ${{ inputs.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f

      - name: Install dependencies
        run: |
          uv sync --frozen --all-packages --all-groups

      - name: Run pip-audit check on dependencies
        run: |
          uv run --package demo-fastapi-api pip-audit --desc > pip-audit-report.json
        # Keep non-blocking while triaging dependency advisories over time.
        continue-on-error: true

      - name: Run bandit security check
        run: |
          uv run --package demo-fastapi-api bandit -r services/api -f json -o bandit-report.json
        # Keep non-blocking while triaging code-level findings over time.
        continue-on-error: true

      - name: Upload security reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: security-reports
          path: |
            pip-audit-report.json
            bandit-report.json

      - name: Secret scanning
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab
        with:
          path: ./
          base: main
          head: HEAD
        # Non-blocking: complements detect-secrets from pre-commit.
        continue-on-error: true
