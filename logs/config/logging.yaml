---
# Application Logging Configuration
# Schema: logging.config.dictConfig
# Reference: https://docs.python.org/3/library/logging.config.html#logging-config-dictschema
#
# Log Levels (in order of severity):
#   NOTSET   (0)  - No filtering; inherit from parent logger
#   DEBUG    (10) - Detailed diagnostic information
#   INFO     (20) - General informational messages
#   WARNING  (30) - Warning messages for potentially harmful situations
#   ERROR    (40) - Error messages for serious problems
#   CRITICAL (50) - Critical messages for very serious errors

version: 1
disable_existing_loggers: false

# Message formatting rules applied to all log records
formatters:
  standard:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

  json: {}

# Output destinations for log messages
handlers:
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: standard
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: standard
    filename: logs/app.log
    maxBytes: 5242880
    backupCount: 5
    encoding: utf-8

  jsonl:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: json
    filename: logs/app.jsonl
    maxBytes: 5242880
    backupCount: 5
    encoding: utf-8

# Root logger that captures all application logs
root:
  level: DEBUG
  handlers: [console, file, jsonl]
