[project]
name = "demo-fastapi"
version = "1.0.0"
description = "Personal Expense Tracking API"
readme = "README.md"
requires-python = ">=3.14,<3.15"
dependencies = [
    "fastapi>=0.115,<1.0",
    "pydantic>=2.7,<3.0",
    "pydantic-settings>=2.3,<3.0",
    "uvicorn[standard]>=0.30,<1.0",
    "sqlalchemy>=2.0,<3.0",
    "passlib[argon2]>=1.7.4,<2.0",
    "argon2-cffi>=23.1,<26.0",
    "PyJWT>=2.10,<3.0",
    "PyYAML>=6.0,<7.0",
    "python-multipart>=0.0.9,<1.0",
    "slowapi>=0.1.9,<2.0",
    "redis>=5.0,<6.0",
    "prometheus-client>=0.20,<1.0",
]

[project.optional-dependencies]
dev = [
    "pre-commit>=3.5,<4.0",
    "pytest>=7.4,<8.0",
    "black>=23.0,<24.0",
    "flake8>=6.1,<7.0",
    "ruff>=0.3,<1.0",
    "mypy>=1.8,<2.0",
    "pydocstyle>=6.3,<7.0",
    "autoflake>=2.0,<3.0",
    "types-PyYAML>=6.0,<7.0",
]

[tool.uv]
package = false

[tool.uv.pip]
strict = true
