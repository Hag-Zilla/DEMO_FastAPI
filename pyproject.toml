[project]
name = "demo-fastapi"
version = "1.0.0"
description = "Personal Expense Tracking API"
readme = "README.md"
requires-python = ">=3.14,<3.15"
dependencies = [
    "fastapi>=0.115,<1.0",
    "pydantic>=2.7,<3.0",
    "pydantic-settings>=2.3,<3.0",
    "uvicorn[standard]>=0.30,<1.0",
    "sqlalchemy>=2.0,<3.0",
    "passlib[argon2]>=1.7.4,<2.0",
    "argon2-cffi>=23.1,<26.0",
    "python-jose[cryptography]>=3.3,<4.0",
    "PyYAML>=6.0,<7.0",
    "python-multipart>=0.0.9,<1.0",
]

[tool.uv]
package = false

[tool.uv.pip]
strict = true
