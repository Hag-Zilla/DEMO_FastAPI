[mypy]
python_version = 3.14
check_untyped_defs = False
ignore_missing_imports = True
disallow_untyped_defs = False
disallow_untyped_calls = False
warn_unused_ignores = False
warn_redundant_casts = False
warn_unused_configs = False

[mypy-services.api.*]
ignore_errors = False
check_untyped_defs = False

[mypy-tests.*]
ignore_errors = True
