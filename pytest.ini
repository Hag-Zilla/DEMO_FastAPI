[pytest]
# Pytest configuration for DEMO_FastAPI

# Add services/ to Python path so 'from app.xxx' imports work
pythonpath = services

# Minimum Python version
minversion = 7.0

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Markers for test categorization
markers =
    unit: Unit tests for individual components
    integration: Integration tests for multi-component interactions
    slow: Slow running tests
    auth: Authentication related tests
    users: User management tests
    expenses: Expense management tests
    alerts: Budget alert tests
    reports: Reporting tests
    admin: Admin-only operation tests

# Test paths
testpaths = services/app/tests

# Coverage options
[coverage:run]
source = services/app
omit =
    */tests/*
    */migrations/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod

precision = 2
